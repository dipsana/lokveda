<h1>MGNREGA Job Card Inquiry</h1>
<form id="mgnrega-form">
    <label>
        Job Card Number:
        <input type="text" name="jobCard" required>
    </label>

    <label>
        Registered Name:
        <input type="text" name="name" required>
    </label>

    <label>
        District:
        <input type="text" name="district" required>
    </label>

    <label>
        Panchayat:
        <input type="text" name="panchayat" required>
    </label>
