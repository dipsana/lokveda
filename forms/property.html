<h1>Property Records Form</h1>
<form id="property-form">
    <label>
        Property Owner Name:
        <input type="text" name="ownerName" required>
    </label>

    <label>
        Property Address:
        <textarea name="address" required></textarea>
    </label>

    <label>
        Property ID / Survey Number:
        <input type="text" name="propertyId" required>
    </label>

    <label>
        Type of Request:
        <select name="requestType" required>
            <option value="">--Select--</option>
            <option value="view">View Record</option>
            <option value="update">Update Record</option>
        </select>
    </label>

    <label>
        Upload Ownership Proof (PDF/JPG):
        <input type="file" name="ownershipProof" accept=".pdf,.jpg,.jpeg,.png">
    </label>
