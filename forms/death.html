<h1>Death Certificate Application</h1>
<form id="deathForm">

  <label>
    Full Name of Deceased:
    <input type="text" name="deceasedName" required>
  </label>

  <label>
    Date of Death:
    <input type="date" name="dod" required>
  </label>

  <label>
    Time of Death:
    <input type="time" name="deathTime" required>
  </label>

  <label>
    Place of Death:
    <input type="text" name="deathPlace" required>
  </label>

  <label>
    Age at Death:
    <input type="number" name="age" required>
  </label>

  <label>
    Gender:
    <select name="gender" required>
      <option value="">Select</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </label>

  <label>
    Cause of Death:
    <input type="text" name="cause">
  </label>

  <label>
    Father's/Husband’s Name:
    <input type="text" name="relativeName" required>
  </label>

  <label>
    Address of Deceased:
    <textarea name="address" required></textarea>
  </label>

  <label>
    Informant’s Name:
    <input type="text" name="informantName" required>
  </label>

  <label>
    Relationship to Deceased:
    <input type="text" name="relationToDeceased" required>
  </label>

  <label>
    Upload Supporting Documents:
    <input type="file" name="docs">
  </label>
