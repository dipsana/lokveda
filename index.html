<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LokVeda — E-gram Panchayat System</title>

    <!-- Favicon -->
    <link rel="icon" href="/lokveda/favicon.png" type="image/png">

    <!-- Global Styles -->
    <link rel="stylesheet" href="/lokveda/style-global.css">

    <!-- SEO -->
    <meta name="description"
        content="LokVeda is a digital E-gram Panchayat system designed to manage local governance, citizens, staff, and administration efficiently.">
    <meta name="keywords" content="LokVeda, E-gram, Panchayat, Digital Governance, India, Gram Panchayat System">
    <meta name="author" content="LokVeda Team">

    <!-- Theme color (mobile browser bar) -->
    <meta name="theme-color" content="#2b7cff">

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="LokVeda — E-gram Panchayat System">
    <meta property="og:description"
        content="A modern digital platform for Gram Panchayat management and citizen services.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/lokveda/preview.png">
    <meta property="og:url" content="https://dipsana.github.io/lokveda/">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LokVeda — E-gram Panchayat System">
    <meta name="twitter:description"
        content="A modern digital platform for Gram Panchayat management and citizen services.">
    <meta name="twitter:image" content="/lokveda/preview.png">

    <!-- Favicon & Style Sheets -->
    <link rel="icon" href="/lokveda/favicon.png" type="image/png">
    <link rel="stylesheet" href="/lokveda/style-global.css">
    <link rel="stylesheet" href="/lokveda/utilities.css">
    <style>
        main {
            max-width: 80%;
        }

        main>section {
            padding: 4vmin 0;
        }

        #wlcm-msg h1 {
            word-break: normal;
            overflow-wrap: break-word;
            white-space: normal;
        }

        #login-box {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 2rem;
            border-radius: 1rem;
            background-color: var(--primaryColor);
            box-shadow: 0 0 20px 0px skyblue;
            justify-content: center;
        }

        #login-box>div {
            flex: 1 1 150px;
            background-color: skyblue;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-size: clamp(1rem, 0.9rem + 0.5vw, 1.2rem);
            font-weight: bold;
        }

        #login-box>div:hover {
            transform: translateY(-5px);
            background-color: cornflowerblue;
        }

        .character {
            font-size: 4rem;
            animation: wave 2s infinite;
            transform-origin: 70% 70%;
            width: 40vmin;
            margin: auto;
        }

        @keyframes wave {
            0% {
                transform: rotate(0deg);
            }

            10% {
                transform: rotate(14deg);
            }

            20% {
                transform: rotate(-8deg);
            }

            30% {
                transform: rotate(14deg);
            }

            40% {
                transform: rotate(-4deg);
            }

            50% {
                transform: rotate(10deg);
            }

            60% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }
    </style>
</head>

<body>
    <main>
        <section class="wlcm-msg">
            <figure class="character">👋</figure>
            <h1>Welcome to LokVeda! — Your E-gram Panchayat</h1>
            <h2>Please login to access your dashboard</h2>
        </section>
        <section id="login-box">
            <div onclick="window.location.href='/lokveda/auth/auth-user.html'">User Login / Sign Up</div>
            <div onclick="window.location.href='/lokveda/auth/auth-staff.html'">Staff Login</div>
            <div onclick="window.location.href='/lokveda/auth/auth-admin.html'">Admin Login</div>
        </section>
    </main>
    <script type="module" data-global="true" src="/lokveda/script-global.js"></script>
</body>

</html>
